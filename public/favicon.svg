<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background pill -->
  <rect width="32" height="32" rx="8" fill="#080b12"/>
  <!-- Gold swoosh ring (the O glyph) -->
  <ellipse cx="16" cy="15" rx="8" ry="4.5"
    fill="none"
    stroke="url(#g)"
    stroke-width="2"
    stroke-linecap="round"
    transform="rotate(-12 16 15)"/>
  <!-- Swoosh tail -->
  <path d="M 7 12 Q 11 7 21 11"
    fill="none"
    stroke="url(#g)"
    stroke-width="1.5"
    stroke-linecap="round"/>
  <!-- A letter mark -->
  <text x="4" y="28"
    font-family="system-ui, sans-serif"
    font-weight="800"
    font-size="13"
    letter-spacing="1"
    fill="white">AV</text>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
</svg>
